[settings]
# isort configuration for Blue Robot Middleware
# https://pycqa.github.io/isort/docs/configuration/options.html

# Profile - use black-compatible settings for consistency
profile = black

# Line length to match common Python standards
line_length = 100

# Import heading comments
import_heading_future = Future imports
import_heading_stdlib = Standard library
import_heading_thirdparty = Third-party
import_heading_firstparty = Blue package
import_heading_localfolder = Local imports

# Organize imports into sections
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

# Known first party modules (Blue package)
known_first_party = blue,config

# Force imports to be on separate lines for better diffs
force_single_line = False
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True

# Skip certain files
skip_glob =
    **/venv/**,
    **/.venv/**,
    **/env/**,
    **/.env/**,
    **/node_modules/**,
    **/__pycache__/**,
    **/.git/**

# Don't skip __init__.py files
skip =

# Add blank line between import sections
add_imports = from __future__ import annotations
